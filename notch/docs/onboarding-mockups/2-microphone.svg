<rect x="0.5" y="0.5" width="399" height="599" rx="16" fill="url(#bg)" stroke="#000000" stroke-opacity="0.4"/>
<circle cx="200.0" cy="130" r="44" fill="#0A84FF" fill-opacity="0.14"/><g transform="translate(200.0,130)" stroke="#0A84FF" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="-7" y="-18" width="14" height="24" rx="7"/><path d="M-12 -2 a12 12 0 0 0 24 0"/><line x1="0" y1="10" x2="0" y2="18"/><line x1="-7" y1="18" x2="7" y2="18"/></g>
<rect x="137.1" y="196" width="125.8" height="18" rx="9" fill="none" stroke="#3a3a3e" stroke-width="1"/><text x="200.0" y="209" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#6b6b71" text-anchor="middle" letter-spacing="0.4">MICROPHONE + SPEECH</text>
<text x="200.0" y="230" font-family="SF Pro Display, -apple-system, Helvetica, Arial, sans-serif" font-size="23" font-weight="600" fill="#ffffff" text-anchor="middle">Let Perch hear you</text>
<text x="200.0" y="266" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#98989f" text-anchor="middle">Hold ⌃⌥ and talk. Perch listens and</text>
<text x="200.0" y="286" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#98989f" text-anchor="middle">transcribes your voice on-device so you</text>
<text x="200.0" y="306" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#98989f" text-anchor="middle">can ask for anything, hands-free.</text>
<g transform="translate(59.57500000000002,343)" stroke="#6b6b71" fill="none" stroke-width="1.4"><path d="M6 1 L11 3 V7 C11 10 8.5 12 6 13 C3.5 12 1 10 1 7 V3 Z"/><rect x="3.6" y="6" width="4.8" height="4" rx="1" fill="#6b6b71" stroke="none"/></g><text x="79.57500000000002" y="356" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b6b71" text-anchor="start">Audio is transcribed on your Mac, never stored.</text>
<rect x="62.0" y="486" width="132" height="34" rx="8" fill="none" stroke="#3a3a3e" stroke-width="1.5"/>
<text x="128.0" y="508.0" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Not Now</text>
<rect x="206.0" y="486" width="132" height="34" rx="8" fill="#0A84FF"/>
<text x="272.0" y="508.0" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Allow Access</text>
<text x="200.0" y="548" font-family="SF Pro Text, -apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b6b71" text-anchor="middle">Two quick macOS prompts: Microphone, then Speech Recognition</text>
